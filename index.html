<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeKingdom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f7f4;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        h1 em {
            font-style: normal;
            color: #2d9c6f;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #7f8c8d;
            margin-bottom: 3rem;
            line-height: 1.8;
            font-weight: 300;
        }

        /* 分割线 */
        .divider {
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5bb98c, #e8a87c);
            border-radius: 2px;
            margin: 0 auto 2.5rem;
        }

        /* 建设中提示 */
        .status-text {
            font-size: 0.95rem;
            color: #5a9e7a;
            font-weight: 400;
        }

        /* 底部页脚 */
        footer {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            color: #a0b5a8;
            font-size: 0.85rem;
            font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", "Consolas", "Courier New", monospace;
        }
        footer span {
            color: #2d9c6f;
        }

        /* 背景装饰 */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            z-index: -1;
            pointer-events: none;
        }
        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: #2d9c6f;
            top: -100px;
            right: -100px;
        }
        .bg-circle-2 {
            width: 300px;
            height: 300px;
            background: #e8a87c;
            bottom: -80px;
            left: -80px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>

    <!-- 主内容 -->
    <main>
        <h1>你好，这里是 <em>CodeKingdom</em></h1>
        <p class="subtitle">记录思考，分享探索，用代码丈量世界</p>
        <div class="divider"></div>
        <p class="status-text">博客内容精心筹备 ✨</p>
    </main>

    <!-- 页脚 -->
    <footer>
        <span>CodeKingdom</span> · 个人博客 · &copy; <span id="currentYear"></span>
    </footer>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
